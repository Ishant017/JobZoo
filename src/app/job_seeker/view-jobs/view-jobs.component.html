<!-- Header End -->
<div class="container-fluid py-5 bg-dark page-header mb-2">
    <div class="container my-5 pt-5 pb-4">
        <h1 class="display-3 text-white mb-3 animated slideInDown">Jobs</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb text-uppercase">
                <li class="breadcrumb-item"><a routerLink="/customer/home">Home</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">Jobs</li>
            </ol>
        </nav>
    </div>
</div>
<!-- Header End -->

<!-- Jobs Start -->
<div class="container-fluid py-5">
    <div class="container">
        <div class="tab-class text-center wow fadeInUp" data-wow-delay="0.3s">

            <div class="tab-content">
                <div id="tab-1" class="tab-pane fade show p-0 active">
                    @for(job of jobs ; track $index){
                    <div class="job-item p-4 mb-4">
                        <div class="row g-4">
                            <div class="col-sm-12 col-md-8 d-flex align-items-center">
                                <img class="flex-shrink-0 img-fluid border rounded" [src]="job.imageUrl" alt=""
                                    style="width: 80px; height: 80px;">
                                <div class="text-start ps-4">

                                    <a [routerLink]="['/customer/job/detail',job.id]">
                                        <h5 class="mb-3 " id="jobTitle">{{job.jobTitle}}</h5>
                                    </a>
                                    <!-- <span class="text-truncate me-3"><i
                                            class="fa fa-map-marker-alt text-success me-2"></i>New York, USA</span> -->
                                    <span class="text-truncate me-3"><i
                                            class="far fa-clock text-success me-2"></i>{{job.type}}</span>
                                    <span class="text-truncate me-0"><i
                                            class="far fa-money-bill-alt text-success me-2"></i>₹{{job.expectedSalary}}</span>
                                </div>
                            </div>
                            <div
                                class="col-sm-12 col-md-4 d-flex flex-column align-items-start align-items-md-end justify-content-center">
                                <div class="d-flex mb-3">

                                    <a class="btn btn-success" [routerLink]="['/job/detail',job.id]">Apply
                                        Now</a>
                                </div>
                                <small class="text-truncate"><i class="far fa-calendar-alt text-success me-2"></i>Date
                                    Line: {{job?.lastApplyDate | date}}</small>
                            </div>
                        </div>
                    </div>

                    }



                </div>

            </div>
        </div>
    </div>
</div>
<!-- Jobs End -->


<!-- Back to Top -->
<a href="/customer/view-jobs" class="btn btn-lg btn-success btn-lg-square back-to-top"><i
        class="bi bi-arrow-up"></i></a>
